name: Build

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: File-size guardrail
        run: scripts/check-file-size.sh
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          lake-package-directory: .
      - name: Import-coverage report (#1209)
        # `--report` is non-failing: it lists orphans without blocking the
        # build. Switch to enforce mode (drop `--report`) once the
        # CallSkipLowerBoundV2 family is wired into the umbrella by the
        # MOD-adapter consolidation work (#1253).
        run: bash scripts/check-imported.sh --report
